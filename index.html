<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভিডিও গ্যালারি</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=Tiro+Bangla&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --surf: #111118;
    --surf2: #1a1a24;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --accent: #7b5ea7;
    --accent2: #e05b8a;
    --text: #eeeef6;
    --muted: #666678;
    --muted2: #7a7a94;
    --r: 14px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overscroll-behavior: none;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(8,8,15,.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .logo {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    box-shadow: 0 4px 18px rgba(123,94,167,.3);
  }

  .logo-text h1 {
    font-family: 'Tiro Bangla', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .logo-text p {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  #totalBadge {
    margin-left: auto;
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 11px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    opacity: .35;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 9px 14px 9px 34px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--accent); }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    display: none;
    padding: 2px 4px;
    line-height: 1;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding-bottom: 11px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    background: var(--surf2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }

  /* ── GRID ── */
  #grid {
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surf);
    border-radius: var(--r);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, opacity .15s, border-color .2s;
    animation: fadeUp .35s ease both;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .card:active { transform: scale(.96); }
  .card.busy { pointer-events: none; opacity: .5; }
  .card:hover { border-color: rgba(123,94,167,.4); }

  .thumb {
    position: relative;
    aspect-ratio: 16/10;
    background: var(--surf2);
    overflow: hidden;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .3s ease;
  }

  .card:hover .thumb img { transform: scale(1.04); }

  .no-thumb {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    background: linear-gradient(135deg, #151520, #1e1e30);
  }

  .play-ring {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.3);
    opacity: 0;
    transition: opacity .2s;
  }

  .card:active .play-ring { opacity: 1; }

  .play-ring span {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,.93);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-ring span svg {
    width: 16px;
    height: 16px;
    fill: #111;
    margin-left: 2px;
  }

  .dur {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0,0,0,.72);
    color: #fff;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── CARD BODY ── */
  .info {
    padding: 9px 11px 11px;
  }

  .info h3 {
    font-family: 'Tiro Bangla', serif;
    font-size: 12.5px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 5px;
    color: var(--text);
  }

  .info-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .info small {
    font-size: 10px;
    color: var(--muted);
  }

  .views-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--muted);
  }

  .views-badge svg {
    width: 10px;
    height: 10px;
    opacity: .5;
  }

  /* ── SKELETON ── */
  .sk {
    background: var(--surf);
    border-radius: var(--r);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .sk-thumb {
    aspect-ratio: 16/10;
    background: var(--surf2);
    position: relative;
    overflow: hidden;
  }

  .sk-body { padding: 9px 11px 11px; }

  .sk-line {
    height: 11px;
    border-radius: 5px;
    background: var(--surf2);
    margin-bottom: 7px;
    position: relative;
    overflow: hidden;
  }

  .sk-line.s { width: 55%; }

  @keyframes sh { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .sk-thumb::after, .sk-line::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
    animation: sh 1.6s infinite;
  }

  /* ── EMPTY / ERROR STATE ── */
  .state {
    text-align: center;
    padding: 52px 20px;
    grid-column: span 2;
  }

  .state .ico { font-size: 42px; margin-bottom: 12px; }

  .state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .state p { color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* ── PAGINATION ── */
  #paginationWrap {
    padding: 6px 14px 28px;
    display: none;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }

  .page-btn {
    background: var(--surf2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 40px;
    cursor: pointer;
    transition: all .18s;
  }

  .page-btn:disabled { opacity: .35; cursor: default; }
  .page-btn:not(:disabled):hover { border-color: var(--accent); color: #b49dd4; }

  #pageInfo { font-size: 12px; color: var(--muted); padding: 0 4px; }

  /* ── VIDEO MODAL ── */
  #videoModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1.2rem;
    backdrop-filter: blur(14px);
  }

  #videoModal.open { display: flex; animation: fadeIn .22s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-inner {
    width: 100%;
    max-width: 680px;
    background: var(--surf);
    border: 1px solid var(--border2);
    border-radius: 18px;
    overflow: hidden;
    animation: scaleUp .22s ease;
    position: relative;
  }

  @keyframes scaleUp { from { transform: scale(.95); } to { transform: scale(1); } }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    z-index: 10;
    background: rgba(0,0,0,.55);
    border: none;
    color: rgba(255,255,255,.8);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }

  .modal-close:hover { background: rgba(224,91,138,.6); }

  .modal-video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }

  .modal-video-wrap video {
    width: 100%;
    height: 100%;
    display: block;
  }

  .modal-footer {
    padding: 12px 16px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .modal-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 14px;
    line-height: 1.4;
    flex: 1;
  }

  .modal-views {
    font-size: 11px;
    color: var(--accent2);
    white-space: nowrap;
    font-weight: 500;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--surf2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 11px 18px;
    border-radius: 40px;
    z-index: 300;
    box-shadow: 0 8px 28px rgba(0,0,0,.5);
    transition: transform .28s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: rgba(123,94,167,.5); }
  #toast.err { border-color: rgba(224,91,138,.5); }

  /* ── RESPONSIVE ── */
  @media (max-width: 400px) {
    #grid { grid-template-columns: 1fr; }
    .state { grid-column: span 1; }
  }

  @media (min-width: 640px) {
    #grid { grid-template-columns: repeat(3, 1fr); padding: 16px; gap: 12px; }
    header { padding: 14px 20px 0; }
    .header-top { margin-bottom: 14px; }
  }

  @media (min-width: 960px) {
    #grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">🎬</div>
    <div class="logo-text">
      <h1>ভিডিও গ্যালারি</h1>
      <p>Watch &amp; Enjoy</p>
    </div>
    <span id="totalBadge">লোড হচ্ছে...</span>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
    <input id="searchInput" type="text" placeholder="ভিডিও খুঁজুন..." autocomplete="off"/>
    <button class="search-clear" id="searchClear">&#10005;</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="latest">🕐 সর্বশেষ</button>
    <button class="tab" data-tab="top">🔥 জনপ্রিয়</button>
    <button class="tab" data-tab="suggested">✨ এলোমেলো</button>
  </div>
</header>

<div id="grid"></div>
<div id="paginationWrap"></div>

<div id="videoModal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">&#10005;</button>
    <div class="modal-video-wrap">
      <video id="modalVideo" controls autoplay playsinline></video>
    </div>
    <div class="modal-footer">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-views" id="modalViews"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  const CFG = window.__CFG__ || {};
  const VIDEOS_FILE = 'videos.txt';
  const LIMIT = 20;

  let _videos = [];
  let _fileSha = null;
  let _saveTimer = null;
  let currentPage = 1;
  let totalPages = 1;
  let currentTab = 'latest';
  let searchQuery = '';
  let searchTimer = null;
  let busy = false;
  let modalIndex = -1;

  // ── HELPERS ──
  function fmtDur(s) {
    if (!s) return '';
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function fmtViews(n) {
    if (!n) return '0';
    if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return String(n);
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('bn-BD', { month: 'short', day: 'numeric' });
  }

  // ── PARSE / SERIALIZE (for GitHub-based view count) ──
  function parseVideos(text) {
    return text.split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'))
      .map(l => {
        const p = l.split('|');
        const url   = (p[0] || '').trim();
        const title = (p[1] || '').trim() || extractName(url);
        const views = parseInt(p[2]) || 0;
        return { url, title, views };
      });
  }

  function serializeVideos(vids) {
    const lines = ['# ভিডিও গ্যালারি — videos.txt', '# ফরম্যাট: URL|শিরোনাম|views', ''];
    vids.forEach(v => lines.push(`${v.url}|${v.title}|${v.views}`));
    return lines.join('\n');
  }

  function extractName(url) {
    try { return decodeURIComponent(url.split('/').pop()).replace(/\.[^.]+$/, ''); } catch { return url; }
  }

  // ── GITHUB API ──
  function ghHeaders() {
    return { Authorization: 'Bearer ' + CFG.token, Accept: 'application/vnd.github+json' };
  }

  async function fetchFileMeta() {
    if (!CFG.token) return null;
    const url = `https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/${VIDEOS_FILE}?ref=${CFG.branch}`;
    const res = await fetch(url, { headers: ghHeaders() });
    if (!res.ok) return null;
    return res.json();
  }

  async function pushVideos() {
    if (!CFG.token) return;
    try {
      const meta = await fetchFileMeta();
      if (meta) _fileSha = meta.sha;
      const content = btoa(unescape(encodeURIComponent(serializeVideos(_videos))));
      const body = { message: `view count আপডেট — ${new Date().toISOString()}`, content, branch: CFG.branch };
      if (_fileSha) body.sha = _fileSha;
      const res = await fetch(
        `https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/${VIDEOS_FILE}`,
        { method: 'PUT', headers: { ...ghHeaders(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      );
      if (res.ok) { const data = await res.json(); _fileSha = data.content?.sha || _fileSha; }
    } catch (e) { console.warn('view count save failed:', e); }
  }

  function incrementView(index) {
    _videos[index].views = (_videos[index].views || 0) + 1;
    const cards = document.querySelectorAll('.card');
    const el = cards[index]?.querySelector('.vnum');
    if (el) el.textContent = fmtViews(_videos[index].views);
    document.getElementById('modalViews').textContent = '▶ ' + _videos[index].views + ' বার দেখা হয়েছে';
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(pushVideos, 500);
  }

  // ── LOAD ──
  async function loadVideos() {
    try {
      const meta = await fetchFileMeta();
      if (meta) {
        _fileSha = meta.sha;
        return parseVideos(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
      }
      const res = await fetch(VIDEOS_FILE + '?t=' + Date.now());
      if (!res.ok) return [];
      return parseVideos(await res.text());
    } catch { return []; }
  }

  // ── RENDER SKELETONS ──
  function showSkeletons() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const sk = document.createElement('div');
      sk.className = 'sk';
      sk.innerHTML = '<div class="sk-thumb"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div>';
      grid.appendChild(sk);
    }
  }

  // ── FILTER / SORT ──
  function getFiltered() {
    let vids = [..._videos];
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      vids = vids.filter(v => v.title.toLowerCase().includes(q));
    }
    if (currentTab === 'top') vids.sort((a, b) => (b.views || 0) - (a.views || 0));
    if (currentTab === 'suggested') vids.sort(() => Math.random() - 0.5);
    return vids;
  }

  // ── RENDER GRID ──
  function renderGrid() {
    const filtered = getFiltered();
    totalPages = Math.max(1, Math.ceil(filtered.length / LIMIT));
    const start  = (currentPage - 1) * LIMIT;
    const slice  = filtered.slice(start, start + LIMIT);
    const total  = filtered.length;

    document.getElementById('totalBadge').textContent = total + ' ভিডিও';

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (!slice.length) {
      const s = document.createElement('div');
      s.className = 'state';
      s.innerHTML = `<div class="ico">${searchQuery ? '🔍' : '📭'}</div>
        <h3>${searchQuery ? 'কিছু পাওয়া যায়নি' : 'কোনো ভিডিও নেই'}</h3>
        <p>${searchQuery ? 'অন্য কিছু খোঁজার চেষ্টা করুন।' : 'এখনো কোনো ভিডিও যোগ করা হয়নি।'}</p>`;
      grid.appendChild(s);
      renderPagination(total);
      return;
    }

    slice.forEach((v, i) => {
      const globalIdx = _videos.indexOf(v);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.04) + 's';

      const durStr = fmtDur(v.duration);

      card.innerHTML = `
        <div class="thumb" id="cthumb-${globalIdx}">
          <div class="no-thumb">🎬</div>
          <div class="play-ring"><span><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></span></div>
          ${durStr ? `<span class="dur">${durStr}</span>` : ''}
        </div>
        <div class="info">
          <h3>${escHtml(v.title)}</h3>
          <div class="info-bottom">
            <small>${v.date ? fmtDate(v.date) : ''}</small>
            <div class="views-badge">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path></svg>
              <span class="vnum">${fmtViews(v.views || 0)}</span>
            </div>
          </div>
        </div>
      `;

      captureThumb(v.url, globalIdx);
      card.addEventListener('click', () => openModal(v, globalIdx));
      grid.appendChild(card);
    });

    renderPagination(total);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── THUMBNAIL ──
  function captureThumb(url, index) {
    const vid = document.createElement('video');
    vid.crossOrigin = 'anonymous';
    vid.muted = true;
    vid.preload = 'metadata';
    vid.src = url;
    vid.addEventListener('loadeddata', () => { vid.currentTime = 0.5; }, { once: true });
    vid.addEventListener('seeked', () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = vid.videoWidth || 640;
        canvas.height = vid.videoHeight || 360;
        canvas.getContext('2d').drawImage(vid, 0, 0, canvas.width, canvas.height);
        const container = document.getElementById('cthumb-' + index);
        if (container) {
          const img = document.createElement('img');
          img.src = canvas.toDataURL('image/jpeg', 0.82);
          const ph = container.querySelector('.no-thumb');
          if (ph) ph.replaceWith(img);
        }
      } catch (e) {}
      vid.src = '';
    }, { once: true });
    vid.load();
  }

  // ── PAGINATION ──
  function renderPagination(total) {
    const wrap = document.getElementById('paginationWrap');
    if (totalPages <= 1) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    wrap.innerHTML = '';
    const prev = document.createElement('button');
    prev.className = 'page-btn';
    prev.textContent = '‹ আগে';
    prev.disabled = currentPage <= 1;
    prev.onclick = () => { if (currentPage > 1) { currentPage--; renderGrid(); } };
    const info = document.createElement('span');
    info.id = 'pageInfo';
    info.textContent = currentPage + ' / ' + totalPages;
    const next = document.createElement('button');
    next.className = 'page-btn';
    next.textContent = 'পরে ›';
    next.disabled = currentPage >= totalPages;
    next.onclick = () => { if (currentPage < totalPages) { currentPage++; renderGrid(); } };
    wrap.appendChild(prev);
    wrap.appendChild(info);
    wrap.appendChild(next);
  }

  // ── MODAL ──
  function openModal(v, index) {
    modalIndex = index;
    document.getElementById('modalVideo').src = v.url;
    document.getElementById('modalTitle').textContent = v.title;
    document.getElementById('modalViews').textContent = '▶ ' + (v.views || 0) + ' বার দেখা হয়েছে';
    document.getElementById('videoModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    incrementView(index);
  }

  function closeModal() {
    const vid = document.getElementById('modalVideo');
    vid.pause(); vid.src = '';
    document.getElementById('videoModal').classList.remove('open');
    document.body.style.overflow = '';
    modalIndex = -1;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('videoModal').addEventListener('click', e => {
    if (e.target === document.getElementById('videoModal')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── TABS ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.tab === currentTab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      currentPage = 1;
      renderGrid();
    });
  });

  // ── SEARCH ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  searchInput.addEventListener('input', () => {
    const v = searchInput.value.trim();
    searchClear.style.display = v ? 'block' : 'none';
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = v;
      currentPage = 1;
      renderGrid();
    }, 350);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.style.display = 'none';
    searchQuery = '';
    currentPage = 1;
    renderGrid();
  });

  // ── TOAST ──
  let toastTmr;
  function toast(msg, cls) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (cls || '');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── ESCAPE ──
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ──
  showSkeletons();
  loadVideos().then(vids => {
    _videos = vids;
    renderGrid();
  });

})();
</script>
</body>
</html>
