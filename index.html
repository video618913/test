<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ভিডিও গ্যালারি</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #e8e8f0;
    --muted: #555568;
    --card-bg: #13131d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 1rem; }

  .logo-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.65;transform:scale(0.95)} }

  .logo h1 {
    font-family: 'Tiro Bangla', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .header-right { display: flex; align-items: center; gap: 1.5rem; }

  .header-meta { font-size: 0.65rem; color: var(--muted); text-align: right; line-height: 1.6; }

  .hero {
    padding: 4rem 3rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .hero::after {
    content: '▶';
    position: absolute;
    right: 3rem; top: 50%;
    transform: translateY(-50%);
    font-size: 9rem;
    color: var(--border);
    pointer-events: none;
  }

  .hero-tag {
    font-size: 0.62rem;
    color: var(--accent2);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .hero h2 {
    font-family: 'Tiro Bangla', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1;
    max-width: 620px;
  }

  .hero h2 span { color: var(--accent); }

  main { padding: 3rem; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  .count span { color: var(--accent); font-weight: 700; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(232,255,71,0.06);
  }



  .thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: #0d0d18;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .thumb-vid {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .thumb-vid.loaded { opacity: 1; }
  .thumb-vid.loaded ~ .thumb-icon { opacity: 0; }

  .thumb-icon {
    position: relative; z-index: 1;
    width: 54px; height: 54px;
    background: rgba(232,255,71,0.1);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s, opacity 0.3s;
  }

  .thumb-icon::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 9px 0 9px 17px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 4px;
  }

  .thumb-overlay {
    position: absolute; inset: 0;
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    transition: background 0.2s;
  }

  .card:hover .thumb-overlay { background: rgba(0,0,0,0.38); }

  .thumb-play {
    width: 54px; height: 54px;
    background: rgba(232,255,71,0.15);
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.2s, transform 0.2s, background 0.2s;
  }

  .thumb-play::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 9px 0 9px 17px;
    border-color: transparent transparent transparent var(--accent);
    margin-left: 4px;
  }

  .card:hover .thumb-play { opacity: 1; transform: scale(1.08); background: rgba(232,255,71,0.28); }

  .card-body {
    padding: 1rem 1.2rem;
    border-top: 1px solid var(--border);
  }

  .card-num { font-size: 0.6rem; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 0.4rem; }

  .card-title {
    font-family: 'Tiro Bangla', serif;
    font-size: 0.95rem;
    line-height: 1.4;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.6rem;
  }

  .card-url { font-size: 0.58rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  .card-views {
    font-size: 0.6rem;
    color: var(--muted);
    white-space: nowrap;
    margin-left: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .card-views .dot { color: var(--accent); font-size: 0.5rem; }

  /* MODAL */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(10px);
  }

  .modal.open { display: flex; animation: modalIn 0.22s ease; }

  @keyframes modalIn { from{opacity:0} to{opacity:1} }

  .modal-inner {
    width: 100%; max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    animation: scaleIn 0.22s ease;
  }

  @keyframes scaleIn { from{transform:scale(0.96)} to{transform:scale(1)} }

  .modal-close {
    position: absolute;
    top: -1.6rem; right: 0;
    background: none; border: none;
    color: var(--muted);
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--accent2); }

  .video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
  .video-wrap video { width: 100%; height: 100%; display: block; }

  .modal-footer {
    padding: 1rem 1.4rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .modal-title { font-family: 'Tiro Bangla', serif; font-size: 1.05rem; }

  .modal-stats { text-align: right; }

  .modal-views { font-size: 0.65rem; color: var(--accent); letter-spacing: 0.05em; }
  .modal-ext { font-size: 0.6rem; color: var(--muted); margin-top: 0.15rem; }

  .empty { grid-column: 1/-1; padding: 5rem 2rem; text-align: center; color: var(--muted); }
  .empty p { font-size: 0.8rem; line-height: 2; }

  .loading {
    grid-column: 1/-1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    animation: blink 1.2s ease infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* save indicator */
  .save-pill {
    position: fixed;
    bottom: 1.8rem; left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--card-bg);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    padding: 0.45rem 1rem;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    text-transform: uppercase;
  }

  .save-pill.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4rem;
  }

  footer a { color: var(--accent); text-decoration: none; font-size: 0.68rem; letter-spacing: 0.1em; }
  footer .rights { font-size: 0.62rem; color: var(--muted); }

  @media (max-width: 640px) {
    header, main, footer, .hero { padding: 1.2rem; }
    .grid { grid-template-columns: 1fr; }
    .hero::after { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <h1>ভিডিও গ্যালারি</h1>
  </div>
  <div class="header-right">
    <div class="header-meta">
      <div id="headerCount">লোড হচ্ছে...</div>
      <div>GitHub Pages</div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-tag">// video collection</div>
  <h2>সব ভিডিও <span>এক জায়গায়</span></h2>
</section>

<main>
  <div class="toolbar">
    <div class="count">মোট <span id="totalCount">—</span> টি ভিডিও</div>
  </div>
  <div class="grid" id="grid">
    <div class="loading">LOADING VIDEOS...</div>
  </div>
</main>

<footer>
  <a href="admin.html">⚙ অ্যাডমিন প্যানেল</a>
  <span class="rights">catbox.moe hosted</span>
</footer>

<div class="modal" id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modalClose">[ ESC ] বন্ধ করুন</button>
    <div class="video-wrap">
      <video id="modalVideo" controls autoplay></video>
    </div>
    <div class="modal-footer">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-stats">
        <div class="modal-views" id="modalViews"></div>
        <div class="modal-ext">catbox.moe</div>
      </div>
    </div>
  </div>
</div>

<div class="save-pill" id="savePill">↑ VIEW COUNT SAVING...</div>

<script>
  // config.js দিয়ে inject হওয়া window.__CFG__ ব্যবহার করা হচ্ছে
  const CFG = window.__CFG__ || {};
  const VIDEOS_FILE = 'videos.txt';

  let _videos  = [];
  let _fileSha = null;
  let _saveTimer = null;

  // ── PARSE / SERIALIZE ──
  function parseVideos(text) {
    return text.split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.startsWith('#'))
      .map(l => {
        const p = l.split('|');
        const url   = (p[0] || '').trim();
        const title = (p[1] || '').trim() || extractName(url);
        const views = parseInt(p[2]) || 0;
        return { url, title, views };
      });
  }

  function serializeVideos(vids) {
    const lines = ['# ভিডিও গ্যালারি — videos.txt', '# ফরম্যাট: URL|শিরোনাম|views', ''];
    vids.forEach(v => lines.push(`${v.url}|${v.title}|${v.views}`));
    return lines.join('\n');
  }

  function extractName(url) {
    try { return decodeURIComponent(url.split('/').pop()).replace(/\.[^.]+$/, ''); }
    catch { return url; }
  }

  // ── GITHUB API ──
  function ghHeaders() {
    return {
      Authorization: 'Bearer ' + CFG.token,
      Accept: 'application/vnd.github+json',
    };
  }

  async function fetchFileMeta() {
    if (!CFG.token) return null;
    const url = `https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/${VIDEOS_FILE}?ref=${CFG.branch}`;
    const res = await fetch(url, { headers: ghHeaders() });
    if (!res.ok) return null;
    return res.json();
  }

  async function pushVideos() {
    if (!CFG.token) return;
    showPill(true);
    try {
      // get fresh sha to avoid conflicts
      const meta = await fetchFileMeta();
      if (meta) _fileSha = meta.sha;

      const content = btoa(unescape(encodeURIComponent(serializeVideos(_videos))));
      const body = {
        message: `view count আপডেট — ${new Date().toISOString()}`,
        content,
        branch: CFG.branch,
      };
      if (_fileSha) body.sha = _fileSha;

      const res = await fetch(
        `https://api.github.com/repos/${CFG.user}/${CFG.repo}/contents/${VIDEOS_FILE}`,
        {
          method: 'PUT',
          headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        }
      );

      if (res.ok) {
        const data = await res.json();
        _fileSha = data.content?.sha || _fileSha;
      }
    } catch (e) {
      console.warn('view count save failed:', e);
    } finally {
      showPill(false);
    }
  }

  // ── VIEW COUNT ──
  function incrementView(index) {
    _videos[index].views = (_videos[index].views || 0) + 1;

    // update card
    const cards = document.querySelectorAll('.card');
    const viewEl = cards[index]?.querySelector('.view-num');
    if (viewEl) viewEl.textContent = _videos[index].views;

    // update modal
    document.getElementById('modalViews').textContent =
      '▶ ' + _videos[index].views + ' বার দেখা হয়েছে';

    // debounce push
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(pushVideos, 400);
  }

  // ── PILL ──
  function showPill(on) {
    document.getElementById('savePill').classList.toggle('show', on);
  }

  // ── LOAD ──
  async function loadVideos() {
    try {
      const meta = await fetchFileMeta();
      if (meta) {
        _fileSha = meta.sha;
        const text = decodeURIComponent(escape(atob(meta.content.replace(/\n/g, ''))));
        return parseVideos(text);
      }
      // fallback plain fetch (no token / public repo)
      const res = await fetch(VIDEOS_FILE + '?t=' + Date.now());
      if (!res.ok) return [];
      return parseVideos(await res.text());
    } catch { return []; }
  }

  // ── RENDER ──
  function renderGrid(vids) {
    _videos = vids;
    const grid = document.getElementById('grid');
    document.getElementById('totalCount').textContent  = vids.length;
    document.getElementById('headerCount').textContent = vids.length + ' ভিডিও';

    if (!vids.length) {
      grid.innerHTML = `<div class="empty"><p>কোনো ভিডিও নেই।<br>অ্যাডমিন প্যানেল থেকে ভিডিও যোগ করুন।</p></div>`;
      return;
    }

    grid.innerHTML = '';
    vids.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = (i * 0.045) + 's';
      card.innerHTML = `
        <div class="thumb">
          <div class="thumb-overlay"></div>
          <div class="thumb-icon"></div>
        </div>
        <div class="card-body">
          <div class="card-num">#${String(i+1).padStart(3,'0')}</div>
          <div class="card-title">${v.title}</div>
          <div class="card-meta">
            <div class="card-url">${v.url}</div>
            <div class="card-views"><span class="dot">▶</span> <span class="view-num">${v.views || 0}</span></div>
          </div>
        </div>
      `;
      card.addEventListener('click', () => openModal(v, i));
      grid.appendChild(card);
    });
  }

  // ── MODAL ──
  function openModal(v, index) {
    document.getElementById('modalVideo').src  = v.url;
    document.getElementById('modalTitle').textContent = v.title;
    document.getElementById('modalViews').textContent = '▶ ' + (v.views || 0) + ' বার দেখা হয়েছে';
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    incrementView(index);
  }

  function closeModal() {
    const vid = document.getElementById('modalVideo');
    vid.pause(); vid.src = '';
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── INIT ──
  loadVideos().then(renderGrid);
</script>
</body>
</html>
