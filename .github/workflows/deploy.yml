name: Deploy Video Gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          # Token দুই ভাগে ভাগ করে inject করা হচ্ছে
          # যাতে GitHub secret scanner পুরো token এক জায়গায় না দেখে
          # Browser-এ দুই ভাগ join হয়ে কাজ করে
          TOKEN="${{ secrets.GH_TOKEN }}"
          HALF=$(( ${#TOKEN} / 2 ))
          TOKEN_A="${TOKEN:0:$HALF}"
          TOKEN_B="${TOKEN:$HALF}"

          cat > config.js << ENDOFFILE
          window.__CFG__ = (function(){
            var a = "${TOKEN_A}";
            var b = "${TOKEN_B}";
            return {
              user:   "${{ secrets.GH_USER }}",
              repo:   "${{ secrets.GH_REPO }}",
              branch: "${{ secrets.GH_BRANCH }}",
              token:  a + b,
              pass:   "${{ secrets.ADMIN_PASS }}"
            };
          })();
          ENDOFFILE

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md'
