name: Deploy Video Gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          cat > config.js << 'ENDOFFILE'
          window.__CFG__ = {
            user:   "${{ secrets.GH_USER }}",
            repo:   "${{ secrets.GH_REPO }}",
            branch: "${{ secrets.GH_BRANCH || 'main' }}",
            token:  "${{ secrets.GH_TOKEN }}",
            pass:   "${{ secrets.ADMIN_PASS }}"
          };
          ENDOFFILE

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md'
